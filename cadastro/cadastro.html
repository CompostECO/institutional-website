<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- CADASTRO -->
  <main class="cadastro-page">

    <div class="cadastro-card">

      <img src="../public/images/logo.svg" alt="Logo">

      <h2 class="heading-lg">Cadastre-se</h2>
      <p class="body-xs">Cadastre-se para usufruir da plataforma</p>

      <span class="input-with-label">
        <label class="label-input">Email</label>
        <input type="email" placeholder="Email">
      </span>

      <span class="input-with-label">
        <label class="label-input">Senha</label>
        <input type="password" placeholder="Senha">
      </span>

      <span class="input-with-label">
        <label class="label-input">Confirmar senha</label>
        <input type="password" placeholder="Confirmar senha">
      </span>

      <button class="button-primary-dark">Cadastrar</button>

      <a class="link">Já tem uma conta?</a>

    </div>

  </main>

</body>
</html>
