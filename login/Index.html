<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- login -->
  <main class="cadastro-page">

    <div class="cadastro-card">

      <img src="../public/images/logo.svg" alt="Logo">

      <h2 class="heading-lg">Bem-Vindo de Volta</h2>
      <p class="body-xs">Faça login para acessar a plataforma</p>

      <span class="input-with-label">
        <label for="ipt_email">Email</label>
        <input type="email" placeholder="Email" id="ipt_email">
      </span>

       <span class="input-with-label">
        <label for="ipt_senha">Senha</label>
        <input type="password" placeholder="Senha" id="ipt_senha">
        <a href="#" class="body-xs link link-recuperar-senha">Esqueceu a senha?</a>
       </span>

      <button class="button-primary-dark">Entrar</button>

      <a id="link-criar-conta" class="link"><p>Ainda não tem uma conta? Cadastre-se</p></a>

    </div>
  </main>

</body>
</html>
