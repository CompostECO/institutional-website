<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- login -->
  <main class="cadastro-page">

    <div class="cadastro-card">

      <img src="../public/images/logo.svg" alt="Logo">

      <h2 class="heading-lg">Bem-Vindo de Volta</h2>
      <p class="body-xs">Faça login para acessar a plataforma</p>

      <span class="input-with-label">
        <label class="label-input" id="ipt_email">Email</label>
        <input type="email" placeholder="Email">
      </span>

       <span class="input-with-label">
            <label class="etiqueta-campo">Senha</label>
            <input type="password" class="caixa-texto-entrada" placeholder="Senha" id="ipt_senha">
            <a href="#" class="link-recuperar-senha">Esqueceu a senha?</a>
       </span>

      <button class="button-primary-dark" >Entrar</button>

      <a class="link">Cadastre-se Aqui</a>

    </div>
  </main>

</body>
</html>
